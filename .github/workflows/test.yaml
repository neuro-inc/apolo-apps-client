on:
  workflow_call: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        py_version: [ "3.12", "3.13", "3.14" ]
    steps:
      - name: Checkout commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Setup Python
        uses: neuro-inc/reuse/.github/actions/setup-python-poetry@ys/drop-poetry-version-file
      - name: Install dependencies
        run: make setup
      - name: Lint
        env:
          CI_LINT_RUN: 1
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
          make lint

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        py_version: [ "3.12", "3.13", "3.14" ]
    steps:
      - name: Checkout commit
        uses: actions/checkout@v6
      - name: Setup Python
        uses: neuro-inc/reuse/.github/actions/setup-python-poetry@ys/drop-poetry-version-file
      - name: Install dependencies
        run: make setup
      - name: Run unit tests
        run: make test_unit
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: .coverage.xml
          flags: py${{ matrix.py_version }}
          name: codecov

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        py_version: [ "3.12", "3.13", "3.14" ]
    steps:
      - name: Checkout commit
        uses: actions/checkout@v6
      - name: Setup Python
        uses: neuro-inc/reuse/.github/actions/setup-python-poetry@ys/drop-poetry-version-file
      - name: Install dependencies
        run: make setup
      - name: Login to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Run integration tests
        run: make test_integration

  check:
    name: Check
    needs:
      - lint
      - test-unit
      - test-integration
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
